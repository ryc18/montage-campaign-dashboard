<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipedrive Campaign Dashboard | RRM</title>
  <meta name="description" content="Real-time Pipedrive email campaign analytics dashboard for Roger Roger Marketing" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="rrm-logo-wrap">
            <img src="https://www.rogerroger.marketing/wp-content/uploads/2024/12/rrm-logo-coral.svg"
              alt="Roger Roger Marketing" class="rrm-logo" id="rrmLogo" width="120" height="42" />
            <span class="rrm-marketing-text">Marketing</span>
          </div>
        </div>
      </div>
      <div class="sidebar-label">Campaigns</div>
      <nav class="campaign-list" id="campaignList">
        <!-- Dynamically populated -->
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-badge">
          <span class="badge-dot"></span>
          <span>Connected to Pipedrive</span>
        </div>
        <div class="sidebar-meta">Auto-refresh: 60s</div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main" id="mainContent">
      <div class="main-header">
        <div class="main-header-left">
          <button class="sidebar-toggle" id="sidebarToggle">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
              <rect y="3" width="20" height="2" rx="1" />
              <rect y="9" width="20" height="2" rx="1" />
              <rect y="15" width="20" height="2" rx="1" />
            </svg>
          </button>
          <h1 class="page-title" id="pageTitle">Select a Campaign</h1>
          <span class="status-badge" id="statusBadge"></span>
        </div>
        <div class="main-header-right">
          <div class="last-updated" id="lastUpdated"></div>
          <button class="btn-refresh" id="refreshBtn" title="Refresh data">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Dashboard sections container -->
      <div class="dashboard" id="dashboard">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 8V21H3V8" />
              <path d="M23 3H1v5h22V3z" />
              <path d="M10 12h4" />
            </svg>
          </div>
          <h2>Select a Campaign</h2>
          <p>Choose a campaign from the sidebar to view analytics</p>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="./main.js"></script>
</body>

</html>
